<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Ugemad — Din ugentlige madplan</title>
<meta name="description" content="AI-powered ugentlig madplanlægning. Spar tid og penge på dine indkøb.">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --sage: #4a6a8a;
  --sage-light: #e3edf5;
  --sage-dark: #3a5570;
  --warm: #b07942;
  --warm-light: #faf0e4;
  --cream: #f7f9fb;
  --sand: #edf1f5;
  --text: #1e2a36;
  --muted: #5e6d7a;
  --card: #ffffff;
  --border: #d4dce4;
}

body {
  font-family: 'Georgia', 'Times New Roman', serif;
  color: var(--text);
  line-height: 1.7;
  overflow-x: hidden;
  background: var(--cream);
}

/* ── Utility ─────────────────────────────── */
.sans { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }

/* ── Language switcher ───────────────────── */
.lang-switch {
  position: fixed;
  top: 1.25rem;
  right: 1.25rem;
  z-index: 100;
  display: flex;
  background: rgba(255,255,255,0.85);
  backdrop-filter: blur(12px);
  border: 1px solid var(--border);
  border-radius: 99px;
  overflow: hidden;
}

.lang-btn {
  font-family: inherit;
  padding: 0.35rem 0.9rem;
  font-size: 0.75rem;
  font-weight: 600;
  border: none;
  background: transparent;
  color: var(--muted);
  cursor: pointer;
  transition: all 0.2s;
  letter-spacing: 0.05em;
}

.lang-btn.active {
  background: var(--sage);
  color: white;
  border-radius: 99px;
}

.lang-btn:not(.active):hover {
  color: var(--text);
  background: rgba(0,0,0,0.03);
}

/* ── Nav ─────────────────────────────────── */
nav {
  padding: 1.5rem 2rem;
  display: flex;
  align-items: center;
  justify-content: space-between;
  max-width: 1100px;
  margin: 0 auto;
}

.logo {
  font-size: 1.5rem;
  font-weight: 700;
  font-style: italic;
  color: var(--sage);
  text-decoration: none;
  letter-spacing: -0.02em;
}

nav a.nav-cta {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  font-size: 0.875rem;
  font-weight: 600;
  color: var(--sage);
  text-decoration: none;
  border: 1.5px solid var(--sage);
  padding: 0.5rem 1.25rem;
  border-radius: 99px;
  transition: all 0.2s;
}

nav a.nav-cta:hover {
  background: var(--sage);
  color: white;
}

/* ── Hero ────────────────────────────────── */
.hero {
  max-width: 1100px;
  margin: 0 auto;
  padding: 3rem 2rem 4rem;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 4rem;
  align-items: center;
}

.hero-text { animation: fadeIn 0.7s ease; }

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(16px); }
  to { opacity: 1; transform: translateY(0); }
}

.hero-label {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  display: inline-block;
  font-size: 0.6875rem;
  font-weight: 600;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--warm);
  background: var(--warm-light);
  padding: 0.4rem 1rem;
  border-radius: 99px;
  margin-bottom: 1.5rem;
}

.hero h1 {
  font-size: clamp(2.25rem, 5vw, 3.5rem);
  font-weight: 700;
  line-height: 1.15;
  letter-spacing: -0.02em;
  margin-bottom: 1.25rem;
  color: var(--text);
}

.hero h1 em {
  font-style: italic;
  color: var(--sage);
}

.hero-text > p {
  font-size: 1.125rem;
  color: var(--muted);
  max-width: 420px;
  margin-bottom: 2rem;
  line-height: 1.7;
}

.hero-actions {
  display: flex;
  align-items: center;
  gap: 1.25rem;
  flex-wrap: wrap;
}

.btn-primary {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  display: inline-flex;
  align-items: center;
  gap: 0.5rem;
  background: var(--sage);
  color: white;
  font-size: 0.9375rem;
  font-weight: 600;
  padding: 0.875rem 1.75rem;
  border-radius: 99px;
  text-decoration: none;
  transition: all 0.2s;
  border: none;
  cursor: pointer;
}

.btn-primary:hover {
  background: var(--sage-dark);
  transform: translateY(-1px);
  box-shadow: 0 4px 16px rgba(74,106,138,0.25);
}

.btn-primary svg { width: 18px; height: 18px; }

.btn-ghost {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  font-size: 0.875rem;
  font-weight: 500;
  color: var(--muted);
  text-decoration: none;
  transition: color 0.2s;
}

.btn-ghost:hover { color: var(--text); }

/* ── Week preview card ───────────────────── */
.week-preview {
  background: var(--card);
  border-radius: 20px;
  padding: 1.75rem;
  box-shadow:
    0 1px 2px rgba(0,0,0,0.04),
    0 8px 32px rgba(0,0,0,0.06);
  animation: fadeIn 0.7s ease 0.15s both;
  position: relative;
  overflow: hidden;
}

.week-preview::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 4px;
  background: linear-gradient(90deg, var(--sage), var(--warm));
}

.week-header {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  font-size: 0.6875rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--muted);
  margin-bottom: 1rem;
  padding-bottom: 0.75rem;
  border-bottom: 1px solid var(--border);
}

.day-row {
  display: flex;
  align-items: center;
  gap: 0.875rem;
  padding: 0.625rem 0;
  border-bottom: 1px solid rgba(0,0,0,0.04);
}

.day-row:last-child { border-bottom: none; }

.day-name {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  font-size: 0.75rem;
  font-weight: 600;
  color: var(--sage);
  width: 32px;
  flex-shrink: 0;
  text-transform: uppercase;
  letter-spacing: 0.04em;
}

.day-meal {
  font-size: 0.9rem;
  color: var(--text);
  flex: 1;
}

.week-footer {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  margin-top: 1rem;
  padding-top: 0.75rem;
  border-top: 1px solid var(--border);
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 0.8125rem;
  color: var(--muted);
}

.week-price {
  font-weight: 700;
  color: var(--sage);
  font-size: 0.9375rem;
}

/* ── Divider ─────────────────────────────── */
.divider {
  max-width: 1100px;
  margin: 0 auto;
  padding: 0 2rem;
}

.divider hr {
  border: none;
  border-top: 1px solid var(--border);
}

/* ── What section ────────────────────────── */
.what {
  max-width: 1100px;
  margin: 0 auto;
  padding: 5rem 2rem;
}

.what h2 {
  font-size: clamp(1.75rem, 3.5vw, 2.5rem);
  font-weight: 700;
  letter-spacing: -0.02em;
  margin-bottom: 0.75rem;
  text-align: center;
}

.what > p {
  text-align: center;
  color: var(--muted);
  font-size: 1.0625rem;
  max-width: 480px;
  margin: 0 auto 3.5rem;
}

.what-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 1.5rem;
}

.what-card {
  background: var(--card);
  border-radius: 16px;
  padding: 2rem 1.75rem;
  border: 1px solid var(--border);
  transition: border-color 0.25s, box-shadow 0.25s;
}

.what-card:hover {
  border-color: var(--sage-light);
  box-shadow: 0 4px 20px rgba(74,106,138,0.08);
}

.what-card h3 {
  font-size: 1.0625rem;
  font-weight: 700;
  margin-bottom: 0.5rem;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
}

.what-card p {
  color: var(--muted);
  font-size: 0.9375rem;
  line-height: 1.65;
}

/* ── How section ─────────────────────────── */
.how {
  background: var(--sand);
  padding: 5rem 2rem;
}

.how-inner {
  max-width: 680px;
  margin: 0 auto;
}

.how h2 {
  font-size: clamp(1.75rem, 3.5vw, 2.5rem);
  font-weight: 700;
  letter-spacing: -0.02em;
  margin-bottom: 3rem;
  text-align: center;
}

.how-step {
  display: flex;
  gap: 1.5rem;
  margin-bottom: 2.5rem;
  position: relative;
}

.how-step:last-child { margin-bottom: 0; }

.how-num {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  width: 40px;
  height: 40px;
  border-radius: 50%;
  border: 2px solid var(--sage);
  color: var(--sage);
  font-size: 0.9375rem;
  font-weight: 700;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  background: var(--sand);
  position: relative;
  z-index: 1;
}

.how-step:not(:last-child) .how-num::after {
  content: '';
  position: absolute;
  top: 40px;
  left: 50%;
  transform: translateX(-50%);
  width: 1.5px;
  height: calc(100% + 2.5rem);
  background: var(--border);
  z-index: -1;
}

.how-step-text h3 {
  font-size: 1.0625rem;
  font-weight: 700;
  margin-bottom: 0.25rem;
  padding-top: 0.4rem;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
}

.how-step-text p {
  color: var(--muted);
  font-size: 0.9375rem;
}

/* ── CTA ─────────────────────────────────── */
.cta {
  background: var(--sage);
  padding: 5rem 2rem;
  text-align: center;
}

.cta h2 {
  font-size: clamp(1.75rem, 4vw, 2.5rem);
  font-weight: 700;
  color: white;
  letter-spacing: -0.02em;
  margin-bottom: 0.75rem;
}

.cta p {
  color: rgba(255,255,255,0.75);
  font-size: 1.0625rem;
  margin-bottom: 2rem;
  max-width: 400px;
  margin-left: auto;
  margin-right: auto;
}

.btn-light {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  display: inline-flex;
  align-items: center;
  gap: 0.5rem;
  background: white;
  color: var(--sage);
  font-size: 0.9375rem;
  font-weight: 600;
  padding: 0.875rem 2rem;
  border-radius: 99px;
  text-decoration: none;
  transition: all 0.2s;
}

.btn-light:hover {
  transform: translateY(-1px);
  box-shadow: 0 6px 20px rgba(0,0,0,0.15);
}

.btn-light svg { width: 18px; height: 18px; }

/* ── Footer ──────────────────────────────── */
footer {
  padding: 2rem;
  text-align: center;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  color: var(--muted);
  font-size: 0.8125rem;
  background: var(--cream);
  border-top: 1px solid var(--border);
}

footer a {
  color: var(--sage);
  text-decoration: none;
}

/* ── Mobile ──────────────────────────────── */
@media (max-width: 768px) {
  .hero {
    grid-template-columns: 1fr;
    gap: 2.5rem;
    padding: 2rem 1.25rem 3rem;
  }
  .hero-text > p { max-width: 100%; }
  .what { padding: 4rem 1.25rem; }
  .what-grid { grid-template-columns: 1fr; }
  .how { padding: 4rem 1.25rem; }
  .cta { padding: 4rem 1.25rem; }
  .lang-switch { top: 0.75rem; right: 0.75rem; }
  nav { padding: 1rem 1.25rem; }
}
</style>
</head>
<body>

<!-- Language switcher -->
<div class="lang-switch" id="langSwitch">
  <button class="lang-btn active" onclick="setLang('da')">DA</button>
  <button class="lang-btn" onclick="setLang('en')">EN</button>
</div>

<!-- Nav -->
<nav>
  <a href="/" class="logo">Ugemad</a>
  <a href="/meal-planner" class="nav-cta" data-da="Lav madplan" data-en="Plan meals"></a>
</nav>

<!-- Hero -->
<section class="hero">
  <div class="hero-text">
    <div class="hero-label" data-da="Madplanlægning med AI" data-en="AI-powered meal planning"></div>
    <h1 data-da="Hvad skal vi have <em>i denne uge?</em>" data-en="What are we having <em>this week?</em>"></h1>
    <p data-da="Ugemad laver en komplet madplan med opskrifter, indkøbsliste og priser — tilpasset din familie, dit budget og dine præferencer." data-en="Ugemad creates a complete meal plan with recipes, shopping list, and prices — tailored to your family, budget, and preferences."></p>
    <div class="hero-actions">
      <a href="/meal-planner" class="btn-primary">
        <span data-da="Prøv det gratis" data-en="Try it free"></span>
        <svg viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M3 10a.75.75 0 01.75-.75h10.638L10.23 5.29a.75.75 0 111.04-1.08l5.5 5.25a.75.75 0 010 1.08l-5.5 5.25a.75.75 0 11-1.04-1.08l4.158-3.96H3.75A.75.75 0 013 10z"/></svg>
      </a>
      <a href="#hvordan" class="btn-ghost" data-da="Hvordan virker det?" data-en="How does it work?"></a>
    </div>
  </div>

  <div class="week-preview">
    <div class="week-header" data-da="Uge 15 — madplan" data-en="Week 15 — meal plan"></div>
    <div class="day-row">
      <span class="day-name" data-da="Man" data-en="Mon"></span>
      <span class="day-meal" data-da="Kylling i karry med jasminris" data-en="Chicken curry with jasmine rice"></span>
    </div>
    <div class="day-row">
      <span class="day-name" data-da="Tir" data-en="Tue"></span>
      <span class="day-meal" data-da="Pasta med kødsauce og parmesan" data-en="Pasta with meat sauce and parmesan"></span>
    </div>
    <div class="day-row">
      <span class="day-name" data-da="Ons" data-en="Wed"></span>
      <span class="day-meal" data-da="Laksefrikadeller med remoulade" data-en="Salmon patties with remoulade"></span>
    </div>
    <div class="day-row">
      <span class="day-name" data-da="Tor" data-en="Thu"></span>
      <span class="day-meal" data-da="Butternut squash-suppe og brød" data-en="Butternut squash soup and bread"></span>
    </div>
    <div class="day-row">
      <span class="day-name" data-da="Fre" data-en="Fri"></span>
      <span class="day-meal" data-da="Hjemmelavet pizza med mozzarella" data-en="Homemade pizza with mozzarella"></span>
    </div>
    <div class="week-footer">
      <span data-da="5 dage · 2 personer" data-en="5 days · 2 people"></span>
      <span class="week-price">487 kr</span>
    </div>
  </div>
</section>

<div class="divider"><hr></div>

<!-- What it does -->
<section class="what">
  <h2 data-da="Hverdagsmad uden besvær" data-en="Weekday meals, no hassle"></h2>
  <p data-da="Fortæl hvad du har lyst til, og lad AI'en klare resten." data-en="Tell us what you're in the mood for and let the AI handle the rest."></p>
  <div class="what-grid">
    <div class="what-card">
      <h3 data-da="Personlig madplan" data-en="Personal meal plan"></h3>
      <p data-da="AI'en forstår dine kostvaner, allergier og hvad du har lyst til. Du får en ugeplan der passer lige præcis til din husstand." data-en="The AI understands your dietary habits, allergies, and cravings. You get a weekly plan that fits your exact household."></p>
    </div>
    <div class="what-card">
      <h3 data-da="Indkøbsliste med priser" data-en="Shopping list with prices"></h3>
      <p data-da="Alle ingredienser samles i en indkøbsliste med rigtige priser. Du kan fjerne eller tilføje varer, og sende det hele til din kurv." data-en="All ingredients are collected in a shopping list with real prices. Remove or add items and send it all to your basket."></p>
    </div>
    <div class="what-card">
      <h3 data-da="Inden for dit budget" data-en="Within your budget"></h3>
      <p data-da="Sæt et ugebudget og AI'en planlægger derefter. Du ser den samlede pris før du handler — ingen overraskelser." data-en="Set a weekly budget and the AI plans accordingly. See the total price before you shop — no surprises."></p>
    </div>
  </div>
</section>

<!-- How it works -->
<section class="how" id="hvordan">
  <div class="how-inner">
    <h2 data-da="Tre trin til ugens mad" data-en="Three steps to the week's meals"></h2>
    <div class="how-step">
      <div class="how-num">1</div>
      <div class="how-step-text">
        <h3 data-da="Beskriv din uge" data-en="Describe your week"></h3>
        <p data-da="Hvor mange er I? Hvilke dage? Allergier, budget, yndlingsretter — det tager under et minut." data-en="How many are you? Which days? Allergies, budget, favourite dishes — takes under a minute."></p>
      </div>
    </div>
    <div class="how-step">
      <div class="how-num">2</div>
      <div class="how-step-text">
        <h3 data-da="Få din madplan" data-en="Get your meal plan"></h3>
        <p data-da="AI'en genererer en komplet ugeplan med opskrifter og ingredienser. Ikke tilfreds? Juster med et klik." data-en="The AI generates a complete weekly plan with recipes and ingredients. Not happy? Adjust with a click."></p>
      </div>
    </div>
    <div class="how-step">
      <div class="how-num">3</div>
      <div class="how-step-text">
        <h3 data-da="Godkend og bestil" data-en="Approve and order"></h3>
        <p data-da="Gennemgå listen, tilpas den og send varerne til din indkøbskurv. Færdig." data-en="Review the list, tweak it, and send the items to your shopping basket. Done."></p>
      </div>
    </div>
  </div>
</section>

<!-- CTA -->
<section class="cta">
  <h2 data-da="Prøv Ugemad i dag" data-en="Try Ugemad today"></h2>
  <p data-da="Gratis at bruge. Ingen kreditkort." data-en="Free to use. No credit card needed."></p>
  <a href="/meal-planner" class="btn-light">
    <span data-da="Lav din første madplan" data-en="Create your first meal plan"></span>
    <svg viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M3 10a.75.75 0 01.75-.75h10.638L10.23 5.29a.75.75 0 111.04-1.08l5.5 5.25a.75.75 0 010 1.08l-5.5 5.25a.75.75 0 11-1.04-1.08l4.158-3.96H3.75A.75.75 0 013 10z"/></svg>
  </a>
</section>

<footer>
  <p>Ugemad &copy; 2026</p>
</footer>

<script>
let lang = localStorage.getItem('ugemad_lang') || 'da';

function setLang(l) {
  lang = l;
  localStorage.setItem('ugemad_lang', l);
  document.documentElement.lang = l;
  document.querySelectorAll('[data-da]').forEach(el => {
    el.innerHTML = el.getAttribute('data-' + l);
  });
  document.querySelectorAll('.lang-btn').forEach(btn => {
    btn.classList.toggle('active', btn.textContent.trim() === l.toUpperCase());
  });
  document.title = l === 'da' ? 'Ugemad \u2014 Din ugentlige madplan' : 'Ugemad \u2014 Your weekly meal plan';
}

// Init
setLang(lang);
</script>
</body>
</html>

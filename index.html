<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Ugemad — Din ugentlige madplan</title>
<meta name="description" content="AI-powered ugentlig madplanlægning. Spar tid og penge på dine indkøb.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --ink: #0a0a0a;
  --ink-soft: #171717;
  --text: #0a0a0a;
  --text-secondary: #404040;
  --muted: #737373;
  --muted-soft: #a3a3a3;
  --bg: #fafaf9;
  --bg-tint: #f5f5f4;
  --card: #ffffff;
  --border: #e7e5e4;
  --border-light: #f5f5f4;
  --border-strong: #d6d3d1;
  --blue: #2563eb;
  --blue-soft: #eff6ff;
  --blue-glow: rgba(37,99,235,0.12);
  --accent: #2563eb;
  --font-sans: 'Geist', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  --font-mono: 'Geist Mono', ui-monospace, SFMono-Regular, Menlo, monospace;
  --font-display: 'Instrument Serif', Georgia, serif;
  --transition: 0.18s cubic-bezier(0.4, 0, 0.2, 1);
}

html { scroll-behavior: smooth; }

body {
  font-family: var(--font-sans);
  color: var(--text);
  line-height: 1.6;
  overflow-x: hidden;
  background: var(--bg);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  font-feature-settings: 'ss01', 'cv11';
}

/* Subtle grid background */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(to right, rgba(10,10,10,0.025) 1px, transparent 1px),
    linear-gradient(to bottom, rgba(10,10,10,0.025) 1px, transparent 1px);
  background-size: 56px 56px;
  mask-image: radial-gradient(ellipse 70% 60% at 50% 0%, #000 20%, transparent 80%);
  -webkit-mask-image: radial-gradient(ellipse 70% 60% at 50% 0%, #000 20%, transparent 80%);
  pointer-events: none;
  z-index: 0;
}

.mono { font-family: var(--font-mono); font-variant-numeric: tabular-nums; }

/* ── Language switcher ───────────────────── */
.lang-switch {
  position: fixed;
  top: 1rem;
  right: 1rem;
  z-index: 100;
  display: flex;
  background: rgba(255,255,255,0.8);
  backdrop-filter: blur(14px) saturate(180%);
  -webkit-backdrop-filter: blur(14px) saturate(180%);
  border: 1px solid var(--border);
  border-radius: 99px;
  padding: 3px;
  box-shadow: 0 1px 2px rgba(10,10,10,0.04);
}

.lang-btn {
  font-family: var(--font-mono);
  padding: 0.3rem 0.75rem;
  font-size: 0.6875rem;
  font-weight: 500;
  border: none;
  background: transparent;
  color: var(--muted);
  cursor: pointer;
  transition: all var(--transition);
  letter-spacing: 0.05em;
  border-radius: 99px;
}

.lang-btn.active {
  background: var(--ink);
  color: var(--card);
}

.lang-btn:not(.active):hover {
  color: var(--text);
}

/* ── Nav ─────────────────────────────────── */
nav {
  padding: 1.25rem 2rem;
  display: flex;
  align-items: center;
  justify-content: space-between;
  max-width: 1180px;
  margin: 0 auto;
  position: relative;
  z-index: 2;
}

.logo {
  font-family: var(--font-sans);
  font-size: 1.0625rem;
  font-weight: 600;
  color: var(--ink);
  text-decoration: none;
  letter-spacing: -0.02em;
  display: inline-flex;
  align-items: center;
  gap: 0.5rem;
}

.logo::before {
  content: '';
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--blue);
  box-shadow: 0 0 0 4px var(--blue-glow);
}

.nav-links {
  display: flex;
  align-items: center;
  gap: 0.5rem;
}

.nav-link {
  font-size: 0.8125rem;
  font-weight: 500;
  color: var(--muted);
  text-decoration: none;
  transition: color var(--transition);
  padding: 0.5rem 0.875rem;
  border-radius: 8px;
}

.nav-link:hover { color: var(--text); background: var(--bg-tint); }

nav a.nav-cta {
  font-size: 0.8125rem;
  font-weight: 500;
  color: var(--card);
  text-decoration: none;
  background: var(--ink);
  padding: 0.5rem 0.9375rem;
  border-radius: 8px;
  transition: all var(--transition);
  border: 1px solid var(--ink);
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.08), 0 1px 2px rgba(10,10,10,0.1);
}

nav a.nav-cta:hover {
  background: var(--ink-soft);
  transform: translateY(-1px);
}

/* ── Hero ────────────────────────────────── */
.hero {
  max-width: 1180px;
  margin: 0 auto;
  padding: 4rem 2rem 5rem;
  display: grid;
  grid-template-columns: 1.1fr 0.9fr;
  gap: 4.5rem;
  align-items: center;
  position: relative;
  z-index: 1;
}

.hero-text { animation: fadeIn 0.6s cubic-bezier(0.2, 0, 0, 1); }

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

.hero-label {
  font-family: var(--font-mono);
  display: inline-flex;
  align-items: center;
  gap: 0.5rem;
  font-size: 0.6875rem;
  font-weight: 500;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  color: var(--muted);
  background: var(--card);
  padding: 0.3125rem 0.75rem 0.3125rem 0.5rem;
  border-radius: 99px;
  margin-bottom: 1.5rem;
  border: 1px solid var(--border);
  box-shadow: 0 1px 2px rgba(10,10,10,0.03);
}

.hero-label::before {
  content: '';
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--blue);
  box-shadow: 0 0 0 3px var(--blue-glow);
}

.hero h1 {
  font-size: clamp(2.25rem, 5.5vw, 3.75rem);
  font-weight: 500;
  line-height: 1.02;
  letter-spacing: -0.035em;
  margin-bottom: 1.5rem;
  color: var(--ink);
}

.hero h1 em {
  font-family: var(--font-display);
  font-style: italic;
  font-weight: 400;
  color: var(--ink);
  letter-spacing: -0.01em;
}

.hero-text > p {
  font-size: 1.0625rem;
  color: var(--text-secondary);
  max-width: 440px;
  margin-bottom: 2rem;
  line-height: 1.55;
}

.hero-actions {
  display: flex;
  align-items: center;
  gap: 0.75rem;
  flex-wrap: wrap;
}

.btn-primary {
  font-family: var(--font-sans);
  display: inline-flex;
  align-items: center;
  gap: 0.5rem;
  background: var(--ink);
  color: var(--card);
  font-size: 0.875rem;
  font-weight: 500;
  padding: 0.625rem 1.125rem;
  border-radius: 8px;
  text-decoration: none;
  transition: all var(--transition);
  border: 1px solid var(--ink);
  cursor: pointer;
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.08), 0 1px 2px rgba(10,10,10,0.1);
  letter-spacing: -0.005em;
}

.btn-primary:hover {
  background: var(--ink-soft);
  transform: translateY(-1px);
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.1), 0 4px 12px rgba(10,10,10,0.12);
}

.btn-primary svg { width: 14px; height: 14px; }

.btn-ghost {
  font-family: var(--font-sans);
  font-size: 0.875rem;
  font-weight: 500;
  color: var(--muted);
  text-decoration: none;
  transition: all var(--transition);
  padding: 0.625rem 0.875rem;
  border-radius: 8px;
  display: inline-flex;
  align-items: center;
  gap: 0.375rem;
}

.btn-ghost:hover { color: var(--text); background: var(--bg-tint); }

.btn-ghost::after {
  content: '→';
  font-family: var(--font-mono);
  opacity: 0.5;
  transition: transform var(--transition);
}

.btn-ghost:hover::after { transform: translateX(2px); opacity: 1; }

/* ── Week preview card ───────────────────── */
.week-preview {
  background: var(--card);
  border-radius: 14px;
  padding: 1.25rem;
  border: 1px solid var(--border);
  box-shadow:
    0 1px 2px rgba(10,10,10,0.03),
    0 8px 24px rgba(10,10,10,0.04);
  animation: fadeIn 0.6s cubic-bezier(0.2, 0, 0, 1) 0.1s both;
  position: relative;
}

.week-header {
  font-family: var(--font-mono);
  font-size: 0.6875rem;
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--muted);
  margin-bottom: 0.25rem;
  padding: 0 0.25rem 0.75rem;
  border-bottom: 1px solid var(--border-light);
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.week-header-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--blue);
  box-shadow: 0 0 0 3px var(--blue-glow);
}

.day-row {
  display: flex;
  align-items: center;
  gap: 0.875rem;
  padding: 0.5rem 0.25rem;
  border-bottom: 1px solid var(--border-light);
  transition: background var(--transition);
  border-radius: 6px;
}

.day-row:last-of-type { border-bottom: none; }

.day-row:hover { background: var(--bg-tint); }

.day-name {
  font-family: var(--font-mono);
  font-size: 0.6875rem;
  font-weight: 500;
  color: var(--muted);
  width: 32px;
  flex-shrink: 0;
  text-transform: uppercase;
  letter-spacing: 0.04em;
}

.day-meal {
  font-size: 0.875rem;
  color: var(--text);
  flex: 1;
  letter-spacing: -0.005em;
}

.week-footer {
  margin-top: 0.5rem;
  padding: 0.75rem 0.25rem 0;
  border-top: 1px solid var(--border-light);
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 0.75rem;
  color: var(--muted);
  font-family: var(--font-mono);
  letter-spacing: 0.01em;
}

.week-price {
  font-weight: 500;
  color: var(--ink);
  font-size: 0.8125rem;
}

/* ── What section ────────────────────────── */
.what {
  max-width: 1180px;
  margin: 0 auto;
  padding: 6rem 2rem 5rem;
  position: relative;
  z-index: 1;
}

.section-label {
  font-family: var(--font-mono);
  display: inline-flex;
  align-items: center;
  gap: 0.5rem;
  font-size: 0.6875rem;
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--muted);
  margin-bottom: 1rem;
}

.section-label::before {
  content: '';
  width: 14px;
  height: 1px;
  background: var(--border-strong);
}

.section-head {
  text-align: center;
  margin-bottom: 3.5rem;
}

.section-head .section-label { display: inline-flex; }

.what h2, .how h2, .cta h2 {
  font-size: clamp(1.875rem, 4vw, 2.75rem);
  font-weight: 500;
  letter-spacing: -0.035em;
  line-height: 1.1;
  color: var(--ink);
}

.what h2 em, .how h2 em, .cta h2 em {
  font-family: var(--font-display);
  font-style: italic;
  font-weight: 400;
  letter-spacing: -0.01em;
}

.what > .section-head > p,
.how > .how-inner > .section-head > p {
  color: var(--text-secondary);
  font-size: 1rem;
  max-width: 460px;
  margin: 0.75rem auto 0;
  line-height: 1.55;
}

.what-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 1rem;
}

.what-card {
  background: var(--card);
  border-radius: 14px;
  padding: 1.75rem 1.5rem;
  border: 1px solid var(--border);
  transition: all var(--transition);
  position: relative;
  overflow: hidden;
}

.what-card::before {
  content: attr(data-num);
  position: absolute;
  top: 1rem;
  right: 1.25rem;
  font-family: var(--font-mono);
  font-size: 0.625rem;
  color: var(--muted-soft);
  letter-spacing: 0.04em;
}

.what-card:hover {
  border-color: var(--border-strong);
  box-shadow: 0 1px 2px rgba(10,10,10,0.03), 0 12px 28px rgba(10,10,10,0.05);
  transform: translateY(-2px);
}

.what-card h3 {
  font-size: 0.9375rem;
  font-weight: 600;
  margin-bottom: 0.5rem;
  letter-spacing: -0.01em;
  color: var(--ink);
}

.what-card p {
  color: var(--text-secondary);
  font-size: 0.875rem;
  line-height: 1.55;
}

.what-card-icon {
  width: 32px;
  height: 32px;
  border-radius: 8px;
  background: var(--bg-tint);
  border: 1px solid var(--border);
  display: inline-flex;
  align-items: center;
  justify-content: center;
  margin-bottom: 1rem;
  color: var(--ink);
}

.what-card-icon svg { width: 16px; height: 16px; }

/* ── How section ─────────────────────────── */
.how {
  background: var(--card);
  padding: 6rem 2rem;
  border-top: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
  position: relative;
  z-index: 1;
}

.how-inner {
  max-width: 720px;
  margin: 0 auto;
}

.how-steps {
  display: flex;
  flex-direction: column;
  gap: 0;
  margin-top: 1rem;
}

.how-step {
  display: flex;
  gap: 1.5rem;
  padding: 1.5rem 0;
  border-bottom: 1px solid var(--border-light);
  position: relative;
  align-items: flex-start;
}

.how-step:last-child { border-bottom: none; }

.how-num {
  font-family: var(--font-mono);
  min-width: 52px;
  font-size: 0.6875rem;
  font-weight: 500;
  color: var(--muted);
  letter-spacing: 0.06em;
  text-transform: uppercase;
  padding-top: 0.25rem;
  flex-shrink: 0;
}

.how-step-text h3 {
  font-size: 1rem;
  font-weight: 600;
  margin-bottom: 0.25rem;
  letter-spacing: -0.01em;
  color: var(--ink);
}

.how-step-text p {
  color: var(--text-secondary);
  font-size: 0.9375rem;
  line-height: 1.55;
}

/* ── CTA ─────────────────────────────────── */
.cta {
  max-width: 1180px;
  margin: 0 auto;
  padding: 6rem 2rem;
  text-align: center;
  position: relative;
  z-index: 1;
}

.cta-card {
  background: var(--ink);
  border-radius: 20px;
  padding: 4rem 2rem;
  position: relative;
  overflow: hidden;
  border: 1px solid var(--ink);
  box-shadow: 0 1px 2px rgba(10,10,10,0.1), 0 24px 48px rgba(10,10,10,0.15);
}

.cta-card::before {
  content: '';
  position: absolute;
  inset: 0;
  background:
    radial-gradient(ellipse 80% 50% at 50% -20%, rgba(37,99,235,0.35), transparent 70%),
    radial-gradient(ellipse 60% 40% at 20% 100%, rgba(37,99,235,0.12), transparent 60%);
  pointer-events: none;
}

.cta-card::after {
  content: '';
  position: absolute;
  inset: 0;
  background-image:
    linear-gradient(to right, rgba(255,255,255,0.03) 1px, transparent 1px),
    linear-gradient(to bottom, rgba(255,255,255,0.03) 1px, transparent 1px);
  background-size: 40px 40px;
  mask-image: radial-gradient(ellipse 50% 50% at 50% 50%, #000 30%, transparent 75%);
  -webkit-mask-image: radial-gradient(ellipse 50% 50% at 50% 50%, #000 30%, transparent 75%);
  pointer-events: none;
}

.cta-card > * { position: relative; z-index: 1; }

.cta-card .section-label {
  color: rgba(255,255,255,0.55);
}

.cta-card .section-label::before {
  background: rgba(255,255,255,0.2);
}

.cta-card h2 {
  color: white;
  margin-bottom: 0.75rem;
}

.cta-card h2 em { color: white; }

.cta-card > p {
  color: rgba(255,255,255,0.65);
  font-size: 1rem;
  margin-bottom: 2rem;
  max-width: 420px;
  margin-left: auto;
  margin-right: auto;
}

.btn-light {
  font-family: var(--font-sans);
  display: inline-flex;
  align-items: center;
  gap: 0.5rem;
  background: white;
  color: var(--ink);
  font-size: 0.875rem;
  font-weight: 500;
  padding: 0.625rem 1.25rem;
  border-radius: 8px;
  text-decoration: none;
  transition: all var(--transition);
  border: 1px solid white;
  box-shadow: 0 1px 2px rgba(0,0,0,0.1);
  letter-spacing: -0.005em;
}

.btn-light:hover {
  transform: translateY(-1px);
  box-shadow: 0 8px 24px rgba(0,0,0,0.2);
}

.btn-light svg { width: 14px; height: 14px; }

/* ── Footer ──────────────────────────────── */
footer {
  padding: 2.5rem 2rem;
  font-family: var(--font-mono);
  color: var(--muted);
  font-size: 0.75rem;
  letter-spacing: 0.02em;
  background: var(--bg);
  border-top: 1px solid var(--border);
  position: relative;
  z-index: 1;
}

.footer-inner {
  max-width: 1180px;
  margin: 0 auto;
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-wrap: wrap;
  gap: 1rem;
}

footer a {
  color: var(--muted);
  text-decoration: none;
  transition: color var(--transition);
}

footer a:hover { color: var(--ink); }

.footer-brand {
  display: inline-flex;
  align-items: center;
  gap: 0.5rem;
  color: var(--ink);
  font-weight: 500;
}

.footer-brand::before {
  content: '';
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--blue);
  box-shadow: 0 0 0 3px var(--blue-glow);
}

/* ── Mobile ──────────────────────────────── */
@media (max-width: 860px) {
  .hero {
    grid-template-columns: 1fr;
    gap: 2.5rem;
    padding: 2rem 1.25rem 3rem;
  }
  .hero-text > p { max-width: 100%; }
  .what { padding: 4rem 1.25rem 3rem; }
  .what-grid { grid-template-columns: 1fr; }
  .how { padding: 4rem 1.25rem; }
  .cta { padding: 4rem 1.25rem; }
  .cta-card { padding: 3rem 1.5rem; border-radius: 16px; }
  .lang-switch { top: 0.75rem; right: 0.75rem; }
  nav { padding: 1rem 1.25rem; }
  .footer-inner { justify-content: center; text-align: center; }
}
</style>
</head>
<body>

<!-- Language switcher -->
<div class="lang-switch" id="langSwitch">
  <button class="lang-btn active" onclick="setLang('da')">DA</button>
  <button class="lang-btn" onclick="setLang('en')">EN</button>
</div>

<!-- Nav -->
<nav>
  <a href="/" class="logo">Ugemad</a>
  <div class="nav-links">
    <a href="/meal-planner?mode=signin" class="nav-link" data-da="Log ind" data-en="Sign in"></a>
    <a href="/meal-planner?mode=signup" class="nav-cta" data-da="Kom i gang" data-en="Get started"></a>
  </div>
</nav>

<!-- Hero -->
<section class="hero">
  <div class="hero-text">
    <div class="hero-label" data-da="Madplanlægning med AI" data-en="AI-powered meal planning"></div>
    <h1 data-da="Hvad skal vi have <em>i denne uge?</em>" data-en="What are we having <em>this week?</em>"></h1>
    <p data-da="Ugemad laver en komplet madplan med opskrifter, indkøbsliste og priser — tilpasset din familie, dit budget og dine præferencer." data-en="Ugemad creates a complete meal plan with recipes, shopping list, and prices — tailored to your family, budget, and preferences."></p>
    <div class="hero-actions">
      <a href="/meal-planner" class="btn-primary">
        <span data-da="Prøv det gratis" data-en="Try it free"></span>
        <svg viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M3 10a.75.75 0 01.75-.75h10.638L10.23 5.29a.75.75 0 111.04-1.08l5.5 5.25a.75.75 0 010 1.08l-5.5 5.25a.75.75 0 11-1.04-1.08l4.158-3.96H3.75A.75.75 0 013 10z"/></svg>
      </a>
      <a href="#hvordan" class="btn-ghost" data-da="Hvordan virker det?" data-en="How does it work?"></a>
    </div>
  </div>

  <div class="week-preview">
    <div class="week-header">
      <span data-da="Uge 15 — madplan" data-en="Week 15 — meal plan"></span>
      <span class="week-header-dot"></span>
    </div>
    <div class="day-row">
      <span class="day-name" data-da="Man" data-en="Mon"></span>
      <span class="day-meal" data-da="Kylling i karry med jasminris" data-en="Chicken curry with jasmine rice"></span>
    </div>
    <div class="day-row">
      <span class="day-name" data-da="Tir" data-en="Tue"></span>
      <span class="day-meal" data-da="Pasta med kødsauce og parmesan" data-en="Pasta with meat sauce and parmesan"></span>
    </div>
    <div class="day-row">
      <span class="day-name" data-da="Ons" data-en="Wed"></span>
      <span class="day-meal" data-da="Laksefrikadeller med remoulade" data-en="Salmon patties with remoulade"></span>

<script>
let lang = localStorage.getItem('ugemad_lang') || 'da';

function setLang(l) {
  lang = l;
  localStorage.setItem('ugemad_lang', l);
  document.documentElement.lang = l;
  document.querySelectorAll('[data-da]').forEach(el => {
    el.innerHTML = el.getAttribute('data-' + l);
  });
  document.querySelectorAll('.lang-btn').forEach(btn => {
    btn.classList.toggle('active', btn.textContent.trim() === l.toUpperCase());
  });
  document.title = l === 'da' ? 'Ugemad \u2014 Din ugentlige madplan' : 'Ugemad \u2014 Your weekly meal plan';
}

// Init
setLang(lang);
</script>

<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Ugemad — Madplanlægger</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300..700&family=Geist+Mono:wght@400..600&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<style>
:root {
  /* Monochrome base + single electric accent */
  --ink: #0a0a0a;
  --ink-soft: #171717;
  --text: #0a0a0a;
  --text-secondary: #404040;
  --muted: #737373;
  --muted-soft: #a3a3a3;
  --bg: #fafaf9;
  --bg-tint: #f5f5f4;
  --card: #ffffff;
  --border: #e7e5e4;
  --border-light: #f5f5f4;
  --border-strong: #d6d3d1;

  /* Accent system — surgical use only */
  --blue: #2563eb;
  --blue-deep: #1d4ed8;
  --blue-light: #eff6ff;
  --blue-glow: rgba(37,99,235,0.12);
  --warm: #b07942;
  --warm-light: #fdf6ec;
  --green: #2563eb;
  --green-hover: #1d4ed8;
  --green-bg: #eff6ff;
  --green-glow: rgba(37,99,235,0.12);
  --accent: #2563eb;
  --accent-bg: #eff6ff;
  --red: #dc2626;
  --red-bg: #fef2f2;

  /* Soft elevated shadows — layered, not chunky */
  --shadow-sm: 0 1px 2px rgba(10,10,10,0.04);
  --shadow: 0 1px 2px rgba(10,10,10,0.04), 0 2px 8px rgba(10,10,10,0.04);
  --shadow-lg: 0 1px 2px rgba(10,10,10,0.04), 0 12px 32px -8px rgba(10,10,10,0.08);
  --shadow-card: 0 0 0 1px rgba(10,10,10,0.03), 0 1px 2px rgba(10,10,10,0.04), 0 8px 24px -6px rgba(10,10,10,0.06);
  --shadow-focus: 0 0 0 3px rgba(37,99,235,0.12);

  --ease: cubic-bezier(0.32, 0.72, 0, 1);
  --transition: 180ms cubic-bezier(0.32, 0.72, 0, 1);

  /* Typography */
  --font-sans: 'Geist', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  --font-mono: 'Geist Mono', ui-monospace, 'SF Mono', Menlo, monospace;
  --font-display: 'Instrument Serif', 'Times New Roman', serif;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-feature-settings: "ss01", "cv11"; }
body {
  font-family: var(--font-sans);
  background: var(--bg); color: var(--text);
  min-height: 100dvh; display: flex; justify-content: center;
  padding: 2.5rem 1rem 4rem; line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  font-variant-numeric: tabular-nums;
  background-image:
    radial-gradient(1200px 600px at 50% -200px, rgba(37,99,235,0.05), transparent 60%),
    radial-gradient(800px 400px at 90% 10%, rgba(176,121,66,0.03), transparent 60%);
}
.container { max-width: 560px; width: 100%; }

/* ── Header ─────────────────── */
header { text-align: center; margin-bottom: 2rem; }
header h1 {
  font-size: 1.5rem; font-weight: 500; letter-spacing: -0.035em;
  font-family: var(--font-sans);
  color: var(--ink);
  display: inline-flex; align-items: baseline; gap: 0.375rem;
}
header h1::before {
  content: ''; width: 8px; height: 8px; border-radius: 50%;
  background: var(--blue); display: inline-block;
  box-shadow: 0 0 0 4px var(--blue-glow);
  margin-right: 0.125rem;
  transform: translateY(-1px);
}
header .sub { color: var(--muted); font-size: 0.8125rem; margin-top: 0.25rem; display: none; }

/* ── Card ───────────────────── */
.card {
  background: var(--card); border-radius: 24px;
  box-shadow: var(--shadow-card); padding: 2.25rem;
  position: relative; overflow: hidden;
  border: 1px solid var(--border-light);
}

/* ── Animations ─────────────── */
.step { animation: slideUp 0.35s var(--ease); }
@keyframes slideUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes stagger { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
@keyframes shimmer { from { background-position: -200% 0; } to { background-position: 200% 0; } }

/* ── Step header (number + label) ── */
.step-header {
  display: flex; align-items: center; gap: 0.625rem; margin-bottom: 1.5rem;
}
.step-number {
  height: 22px; min-width: 22px; padding: 0 0.4375rem; border-radius: 999px;
  background: var(--ink); color: var(--card);
  display: inline-flex; align-items: center; justify-content: center;
  font-size: 0.625rem; font-weight: 500; flex-shrink: 0;
  letter-spacing: 0.04em; font-family: var(--font-mono);
}
.step-label {
  font-size: 0.6875rem; font-weight: 500; text-transform: uppercase;
  letter-spacing: 0.14em; color: var(--muted);
  font-family: var(--font-mono);
}

/* ── Form elements ──────────── */
.question {
  font-size: 1.375rem; font-weight: 500; margin-bottom: 0.375rem;
  letter-spacing: -0.025em; color: var(--ink);
  font-family: var(--font-sans);
}
.hint { color: var(--muted); font-size: 0.8125rem; margin-bottom: 1.25rem; line-height: 1.5; }

textarea, input[type="text"], input[type="number"], input[type="email"], input[type="password"] {
  width: 100%; padding: 0.75rem 0.875rem;
  border: 1px solid var(--border); border-radius: 12px;
  font-size: 0.9375rem; font-family: inherit;
  background: var(--card); color: var(--ink);
  transition: all var(--transition); outline: none;
  letter-spacing: -0.005em;
}
textarea:focus, input:focus {
  border-color: var(--ink); background: var(--card);
  box-shadow: var(--shadow-focus);
}
textarea { resize: vertical; min-height: 110px; line-height: 1.55; }
textarea::placeholder, input::placeholder { color: var(--muted-soft); }

/* ── Stepper ────────────────── */
.stepper { display: flex; align-items: center; gap: 1.75rem; justify-content: center; margin: 2rem 0; }
.stepper button {
  width: 36px; height: 36px; border-radius: 10px;
  border: 1px solid var(--border); background: var(--card);
  font-size: 1rem; font-weight: 400; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all var(--transition); color: var(--text-secondary);
}
.stepper button:hover { border-color: var(--ink); color: var(--ink); background: var(--bg-tint); }
.stepper button:active { transform: scale(0.94); }
.stepper .value {
  font-size: 3.25rem; font-weight: 500; min-width: 3ch; text-align: center;
  letter-spacing: -0.05em; font-family: var(--font-sans);
  color: var(--ink); font-variant-numeric: tabular-nums;
}

/* ── Day pills ──────────────── */
.pills { display: flex; flex-wrap: wrap; gap: 0.375rem; margin: 1.25rem 0; justify-content: center; }
.pill {
  padding: 0.5rem 0.875rem; border-radius: 999px;
  border: 1px solid var(--border); background: var(--card);
  cursor: pointer; font-size: 0.75rem; font-weight: 500;
  transition: all var(--transition); user-select: none;
  letter-spacing: 0.08em; text-transform: uppercase;
  color: var(--text-secondary);
  font-family: var(--font-mono);
}
.pill:hover { border-color: var(--ink); color: var(--ink); }
.pill:active { transform: scale(0.97); }
.pill.selected {
  background: var(--ink); color: var(--card); border-color: var(--ink);
}

/* ── Diet chips ─────────────── */
.chips { display: flex; flex-wrap: wrap; gap: 0.375rem; margin-bottom: 1rem; }
.chip {
  padding: 0.4375rem 0.875rem; border-radius: 999px;
  border: 1px solid var(--border); background: var(--card);
  cursor: pointer; font-size: 0.8125rem; font-weight: 450;
  transition: all var(--transition); user-select: none;
  color: var(--text-secondary); letter-spacing: -0.005em;
}
.chip:hover { border-color: var(--ink); color: var(--ink); }
.chip:active { transform: scale(0.97); }
.chip.selected {
  background: var(--ink); color: var(--card);
  border-color: var(--ink); font-weight: 500;
}

/* ── Budget ─────────────────── */
.budget-input {
  display: flex; align-items: baseline; gap: 0.5rem;
  justify-content: center; margin: 2rem 0;
}
.budget-input input {
  width: 5ch; text-align: center;
  font-size: 2.5rem; font-weight: 500; font-family: var(--font-sans);
  border: none; border-bottom: 1.5px solid var(--border); border-radius: 0;
  background: transparent; padding: 0.25rem; color: var(--ink);
  letter-spacing: -0.04em; font-variant-numeric: tabular-nums;
}
.budget-input input:focus { border-bottom-color: var(--blue); box-shadow: none; }
.budget-input span { color: var(--muted); font-size: 1.25rem; font-weight: 500; }

/* ── Buttons ────────────────── */
.actions { display: flex; gap: 0.5rem; margin-top: 1.75rem; }
.btn {
  flex: 1; padding: 0.75rem 1.25rem; border-radius: 12px;
  font-size: 0.875rem; font-weight: 500; cursor: pointer;
  border: 1px solid transparent; transition: all var(--transition); font-family: inherit;
  letter-spacing: -0.005em;
  display: inline-flex; align-items: center; justify-content: center;
}
.btn-primary {
  background: var(--ink); color: var(--card); border-color: var(--ink);
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.08), 0 1px 2px rgba(10,10,10,0.1);
}
.btn-primary:hover { background: var(--ink-soft); transform: translateY(-0.5px); }
.btn-primary:active { transform: translateY(0); }
.btn-secondary {
  background: var(--card); color: var(--ink); border-color: var(--border);
}
.btn-secondary:hover { border-color: var(--border-strong); background: var(--bg-tint); }
.btn-danger { background: transparent; color: var(--red); border-color: var(--border); }
.btn-danger:hover { background: var(--red-bg); border-color: var(--red); }
.btn:disabled { opacity: 0.35; cursor: not-allowed; transform: none !important; }
.btn-text { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 0.8125rem; padding: 0.5rem; font-weight: 450; letter-spacing: -0.005em; }
.btn-text:hover { color: var(--ink); }

/* ── Progress bar ──────────── */
.progress-bar {
  display: flex; gap: 0.25rem; justify-content: center; margin-top: 1.5rem;
}
.prog-seg {
  height: 2px; border-radius: 999px; flex: 1;
  background: var(--border-light); transition: background 0.6s var(--ease);
}
.prog-seg.active { background: var(--ink); }
.prog-seg.done { background: var(--ink); }

/* ── Review summary ─────────── */
.review-grid {
  display: grid; grid-template-columns: 1fr 1fr; gap: 0.625rem;
  margin: 1.25rem 0; font-size: 0.875rem;
}
.review-item {
  background: var(--bg); border-radius: 10px; padding: 0.75rem 1rem;
  border: 1px solid var(--border-light);
}
.review-label {
  font-size: 0.625rem; color: var(--muted); text-transform: uppercase;
  letter-spacing: 0.1em; margin-bottom: 0.25rem; font-weight: 600;
}
.review-value { font-weight: 600; font-size: 0.9375rem; }
.review-full { grid-column: 1 / -1; }

/* ── Pipeline steps ────────── */
.pipeline { text-align: left; padding: 0.5rem 0; }
.pipe-step {
  display: flex; align-items: flex-start; gap: 0.75rem;
  padding: 0.5rem 0; position: relative;
  opacity: 0.3; transition: opacity 0.4s;
}
.pipe-step.active, .pipe-step.done { opacity: 1; }
.pipe-icon {
  width: 28px; height: 28px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 0.75rem; flex-shrink: 0;
  border: 2px solid var(--border); background: var(--card);
  transition: all 0.4s;
}
.pipe-step.active .pipe-icon {
  border-color: var(--green); color: var(--green);
  animation: pulse-ring 1.5s ease infinite;
}
.pipe-step.done .pipe-icon {
  border-color: var(--green); background: var(--green); color: white;
}
@keyframes pulse-ring {
  0%, 100% { box-shadow: 0 0 0 0 var(--green-glow); }
  50% { box-shadow: 0 0 0 8px transparent; }
}
.pipe-body { flex: 1; min-width: 0; }
.pipe-title { font-size: 0.8125rem; font-weight: 600; color: var(--text); }
.pipe-step:not(.active):not(.done) .pipe-title { color: var(--muted); }
.pipe-detail {
  font-size: 0.6875rem; color: var(--muted); margin-top: 0.125rem;
  max-height: 0; overflow: hidden; transition: max-height 0.4s, opacity 0.3s; opacity: 0;
}
.pipe-step.active .pipe-detail { max-height: 3rem; opacity: 1; }
.pipe-step.done .pipe-detail { max-height: 3rem; opacity: 0.6; }
.pipe-connector {
  position: absolute; left: 13px; top: 36px; bottom: -6px;
  width: 2px; background: var(--border);
}
.pipe-step:last-child .pipe-connector { display: none; }
.pipe-step.done .pipe-connector { background: var(--green); }

/* ── Results ────────────────── */
.results { animation: fadeIn 0.4s ease; }
.summary-card {
  background: var(--bg); border-radius: 12px;
  padding: 1.25rem 1.5rem; margin-bottom: 1.5rem;
  display: flex; justify-content: space-around; text-align: center;
  animation: stagger 0.5s ease;
  border: 1px solid var(--border-light);
}
.summary-stat { }
.summary-num {
  font-size: 1.625rem; font-weight: 500; color: var(--ink); line-height: 1.1;
  letter-spacing: -0.03em; font-family: var(--font-sans);
  font-variant-numeric: tabular-nums;
}
.summary-label { font-size: 0.625rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.14em; font-weight: 500; font-family: var(--font-mono); margin-top: 0.375rem; }

.section-title {
  font-size: 0.6875rem; font-weight: 500; margin: 1.5rem 0 0.75rem;
  color: var(--muted); text-transform: uppercase; letter-spacing: 0.14em;
  font-family: var(--font-mono);
}
.section-title:first-child { margin-top: 0; }

/* ── Meal plan card ── */
.plan-card {
  background: var(--card); border-radius: 20px; padding: 1.5rem 1.5rem 1.25rem;
  box-shadow: var(--shadow-card); border: 1px solid var(--border-light);
  position: relative; overflow: hidden;
  animation: stagger 0.5s ease;
}
.plan-card-header {
  font-size: 0.6875rem; font-weight: 500; text-transform: uppercase;
  letter-spacing: 0.14em; color: var(--muted); margin-bottom: 0;
  padding-bottom: 1.125rem; border-bottom: 1px solid var(--border-light);
  font-family: var(--font-mono);
}
.plan-row {
  display: flex; align-items: flex-start; gap: 1.25rem;
  padding: 1.125rem 0; border-bottom: 1px solid var(--border-light);
  animation: stagger 0.4s ease backwards;
}
.plan-row:last-of-type { border-bottom: none; }
.plan-day {
  font-size: 0.6875rem; font-weight: 500; color: var(--muted);
  width: 42px; flex-shrink: 0; text-transform: uppercase;
  letter-spacing: 0.12em; padding-top: 0.25rem;
  font-family: var(--font-mono);
}
.plan-meals { flex: 1; }
.plan-meal-name {
  font-size: 0.9375rem; color: var(--ink); font-weight: 450;
  line-height: 1.45; margin-bottom: 0.125rem;
  letter-spacing: -0.005em;
}
.plan-meal-desc {
  font-size: 0.8125rem; color: var(--muted); line-height: 1.5;
}
.plan-footer {
  margin-top: 0.25rem; padding-top: 1.125rem; border-top: 1px solid var(--border-light);
  display: flex; justify-content: space-between; align-items: center;
  font-size: 0.75rem; color: var(--muted);
  font-family: var(--font-mono); letter-spacing: 0.02em;
}
.plan-price {
  font-weight: 500; color: var(--ink); font-size: 0.9375rem;
  letter-spacing: -0.01em; font-family: var(--font-sans);
  font-variant-numeric: tabular-nums;
}

.recipe-btn {
  display: inline-block; font-size: 0.6875rem; color: var(--green); cursor: pointer;
  border: 1px solid var(--green); background: none; font-family: inherit;
  font-weight: 600; padding: 0.1875rem 0.625rem; border-radius: 6px;
  margin-left: 0.375rem; vertical-align: middle; transition: all var(--transition);
}
.recipe-btn:hover { background: var(--green-bg); transform: translateY(-1px); }
.recipe-steps {
  max-height: 0; overflow: hidden; transition: max-height 0.35s ease;
  margin-top: 0.5rem;
  border-left: 2px solid var(--green-bg);
}
.recipe-steps.open { max-height: 800px; }
.recipe-step {
  font-size: 0.8125rem; color: var(--text); padding: 0.375rem 0 0.375rem 0.875rem;
  line-height: 1.5;
}
.recipe-step + .recipe-step { border-top: 1px solid var(--bg); }

/* ── Shopping list card ── */
.shop-card {
  background: var(--card); border-radius: 16px; padding: 1.75rem;
  box-shadow: var(--shadow); border: 1px solid var(--border);
  animation: stagger 0.5s ease 0.1s backwards;
}

.receipt-line {
  display: flex; justify-content: space-between; align-items: baseline;
  padding: 0.5rem 0; font-size: 0.8125rem;
}
.receipt-line .name { flex: 1; margin-right: 1rem; }
.receipt-line .qty { color: var(--muted); margin-right: 0.5rem; white-space: nowrap; }
.receipt-line .price { font-weight: 600; white-space: nowrap; font-variant-numeric: tabular-nums; }
.receipt-divider { border-top: 1.5px solid var(--border); margin: 0.5rem 0; }
.receipt-total .name { font-weight: 700; }
.receipt-total .price { font-weight: 800; font-size: 0.9375rem; color: var(--green); }
.remaining-positive { color: var(--green); }
.remaining-negative { color: var(--red); }

.warning { background: #fff8c5; border-radius: 8px; padding: 0.75rem 1rem; margin-top: 1rem; font-size: 0.8125rem; }
.warning-item { color: var(--muted); margin-top: 0.25rem; }

/* ── Refine section ─────────── */
.refine-section {
  border-top: 1.5px solid var(--border); margin-top: 1.5rem; padding-top: 1.25rem;
}
.refine-chips { display: flex; flex-wrap: wrap; gap: 0.375rem; margin-bottom: 0.75rem; }
.refine-chip {
  padding: 0.3rem 0.625rem; border-radius: 99px;
  border: 1px solid var(--border); background: var(--card);
  cursor: pointer; font-size: 0.6875rem; font-weight: 500;
  transition: all 0.15s; user-select: none; color: var(--muted);
}
.refine-chip:hover { border-color: var(--green); color: var(--green); }
.refine-chip.active { background: var(--green-bg); border-color: var(--green); color: var(--green); }
.refine-input {
  width: 100%; padding: 0.5rem 0.75rem; border: 1.5px solid var(--border);
  border-radius: 8px; font-size: 0.8125rem; font-family: inherit;
  background: var(--bg); color: var(--text); outline: none;
  transition: border-color 0.15s; resize: none; min-height: 44px;
}
.refine-input:focus { border-color: var(--green); }
.refine-input::placeholder { color: var(--border); }

/* ── Remove buttons ─────────── */
.remove-btn {
  background: none; border: none; color: var(--border); cursor: pointer;
  font-size: 0.75rem; padding: 0.125rem 0.25rem; margin-left: 0.375rem;
  border-radius: 4px; transition: all 0.15s; line-height: 1;
}
.remove-btn:hover { color: var(--red); background: var(--red-bg); }
.receipt-line.removed { opacity: 0.35; text-decoration: line-through; }

/* ── Edit preferences link ──── */
.edit-prefs {
  display: inline-block; font-size: 0.6875rem; color: var(--muted);
  cursor: pointer; border: none; background: none; font-family: inherit;
  padding: 0; margin-top: 0.5rem;
}
.edit-prefs:hover { color: var(--text); text-decoration: underline; }

/* ── Done ───────────────────── */
.done-view { text-align: center; padding: 2rem 1rem; animation: slideUp 0.4s ease; }
.done-view .icon { font-size: 3rem; margin-bottom: 1rem; }
.done-view h2 { font-size: 1.25rem; margin-bottom: 0.5rem; }
.done-view p { color: var(--muted); font-size: 0.9375rem; }
.done-view a { color: var(--green); text-decoration: none; font-weight: 600; }
.done-view a:hover { text-decoration: underline; }

/* ── Error ──────────────────── */
.error-msg { background: var(--red-bg); color: var(--red); padding: 0.75rem 1rem; border-radius: 8px; font-size: 0.875rem; margin-top: 1rem; }

/* ── Settings panel ─────────── */
.settings-panel {
  max-height: 0; overflow: hidden; transition: max-height 0.35s ease;
  border-top: 1px solid var(--bg); margin-top: 0.75rem;
}
.settings-panel.open { max-height: 600px; padding-top: 0.75rem; }
.settings-row { margin-bottom: 0.625rem; }
.settings-label {
  font-size: 0.6875rem; font-weight: 600; color: var(--muted);
  text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 0.125rem;
}
.settings-row select, .settings-row input[type="text"], .settings-row input[type="password"] {
  width: 100%; padding: 0.4375rem 0.625rem; border: 1.5px solid var(--border);
  border-radius: 8px; font-size: 0.8125rem; font-family: inherit;
  background: var(--bg); color: var(--text); outline: none;
}
.settings-row select:focus, .settings-row input:focus { border-color: var(--green); }
.settings-hint { font-size: 0.625rem; color: var(--border); margin-top: 0.125rem; }
.provider-badge {
  display: inline-block; font-size: 0.5625rem; padding: 0.0625rem 0.375rem;
  border-radius: 3px; background: var(--bg); color: var(--muted);
  border: 1px solid var(--border); vertical-align: middle;
}

/* ── Basket viewer ──────────── */
.basket-bar {
  display: flex; align-items: center; justify-content: space-between;
  background: var(--card); border-radius: 12px; box-shadow: var(--shadow);
  padding: 0.75rem 1.125rem; margin-bottom: 0.75rem; cursor: pointer;
  transition: all var(--transition); font-size: 0.8125rem;

const DEFAULT_N8N = location.origin;

function getToken() {
  const parts = location.pathname.split('/').filter(Boolean);
  const idx = parts.indexOf('meal-planner');
  if (idx >= 0 && parts[idx + 1]) return parts[idx + 1];
  const urlToken = new URLSearchParams(location.search).get('token');
  if (urlToken) localStorage.setItem('api_token', urlToken);
  return urlToken || localStorage.getItem('api_token') || '';
}
const API_TOKEN = getToken();

function getN8nBase() {
  return new URLSearchParams(location.search).get('n8n') || localStorage.getItem('n8n_url') || DEFAULT_N8N;
}

const SUPABASE_URL = 'https://qreamprorxtyscatypvv.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_0ZUE_elm6vzB4UNNVNH0Tg_r1E-igug';
let sb = null;
let currentUser = null;
let userProfile = null;

try {
  sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
} catch (e) {
  console.warn('Supabase init failed:', e.message);
}

async function loadProfile(userId) {
  if (!sb) return;
  try {
    const { data, error } = await sb.from('profiles').select('*').eq('id', userId).single();
    if (error && error.code !== 'PGRST116') console.warn('Profile load error:', error);
    if (data) {
      userProfile = data;
      state.people = data.household_size || 2;
      state.diets = data.dietary_preferences || [];
      state.budget = data.weekly_budget || 500;
      state.meals = data.favorite_meals || '';
      state.days = (data.default_days && data.default_days.length > 0) ? data.default_days : [...ALL_DAYS];
      state.notes = data.default_notes || '';
    }
  } catch (e) { console.warn('Failed to load profile:', e); }
}

async function saveProfileData(data) {
  if (!sb || !currentUser) return null;
  try {
    const row = {
      id: currentUser.id,
      display_name: data.displayName || '',
      household_size: data.householdSize || 2,
      dietary_preferences: data.dietaryPreferences || [],
      weekly_budget: data.weeklyBudget || 500,
      favorite_meals: data.favoriteMeals || '',
      default_days: data.defaultDays || [...ALL_DAYS],
      default_notes: data.defaultNotes || '',
      updated_at: new Date().toISOString(),
    };
    if (data.nemligEmail !== undefined) row.nemlig_email = data.nemligEmail;
    if (data.nemligPass !== undefined && data.nemligPass) row.nemlig_pass = data.nemligPass;
    const { error } = await sb.from('profiles').upsert(row);
    if (error) console.warn('Profile save error:', error);
    return !error;
  } catch (e) { console.warn('Failed to save profile:', e); return null; }
}

async function doSignInWithProvider(provider) {
  if (!sb) return alert('Supabase not configured yet. Set SUPABASE_URL and SUPABASE_ANON_KEY.');
  const { error } = await sb.auth.signInWithOAuth({
    provider,
    options: { redirectTo: window.location.href.split('#')[0] }
  });
  if (error) console.error('OAuth error:', error);
}

async function doMagicLink() {
  if (!sb) return;
  const email = document.getElementById('auth-email')?.value?.trim();
  const errEl = document.getElementById('auth-error');
  const btn = document.getElementById('magic-link-btn');
  if (!email) { errEl.textContent = 'Enter your email address.'; errEl.classList.add('show'); return; }

  btn.disabled = true;
  btn.textContent = 'Sending...';
  const { error } = await sb.auth.signInWithOtp({
    email,
    options: { emailRedirectTo: window.location.href.split('#')[0].split('?')[0] }
  });
  if (error) {
    errEl.textContent = error.message;
    errEl.classList.add('show');
    btn.disabled = false;
    btn.textContent = 'Send magic link';
    return;
  }
  // Show success state
  errEl.textContent = 'Check your inbox! Click the link in the email to sign in.';
  errEl.classList.add('show');
  errEl.style.color = 'var(--green)';
  btn.textContent = 'Email sent!';
}

async function doSignOut() {
  if (!sb) return;
  await sb.auth.signOut();
  currentUser = null;
  userProfile = null;
  state.phase = 'auth';
  state.authView = 'login';
  renderUserBar();
  render();
}

function renderUserBar() {
  const bar = document.getElementById('user-bar');
  const sub = document.getElementById('header-sub');
  if (!currentUser) {
    bar.innerHTML = '';
    sub.style.display = '';
    document.getElementById('nav-tabs').style.display = 'none';
    document.getElementById('basket-bar').style.display = 'none';
    return;
  }
  const name = userProfile?.display_name || currentUser.user_metadata?.full_name || currentUser.email || 'User';
  const initial = name.charAt(0).toUpperCase();
  bar.innerHTML = `
    <div class="user-avatar">${esc(initial)}</div>
    <div class="user-name">${esc(name)}</div>
    <button class="btn-text" onclick="doSignOut()">Sign out</button>
  `;
  sub.style.display = 'none';
  document.getElementById('basket-bar').style.display = '';
  renderNavTabs(state.phase === 'profile' ? 'profile' : state.phase === 'orders' ? 'orders' : 'planner');
}

function renderNavTabs(active) {
  const nav = document.getElementById('nav-tabs');
  nav.style.display = 'flex';
  nav.innerHTML = `
    <div class="nav-tab ${active === 'planner' ? 'active' : ''}" onclick="switchTab('planner')">Planner</div>
    <div class="nav-tab ${active === 'orders' ? 'active' : ''}" onclick="switchTab('orders')">Orders</div>
    <div class="nav-tab ${active === 'profile' ? 'active' : ''}" onclick="switchTab('profile')">Profile</div>
  `;
}

function switchTab(tab) {
  if (tab === 'profile') {
    state.phase = 'profile';
  } else if (tab === 'orders') {
    state.phase = 'orders';
    loadOrderHistory();
  } else {
    state.phase = 'form';
    state.step = 0;
  }
  render();
  renderNavTabs(tab);
}

// ── Order History ─────────────────────────────────────────
let orderHistory = [];
let ordersLoading = false;

async function loadOrderHistory() {
  if (ordersLoading) return;
  ordersLoading = true;
  renderOrders();
  try {
    const base = getN8nBase();
    const tp = API_TOKEN ? `?token=${API_TOKEN}` : '';
    const resp = await fetch(`${base}/webhook/order-history${tp}`, {
      method: 'POST', headers: apiHeaders(),
      body: nemligPayload({ take: 5 }),
    });
    if (!resp.ok) throw new Error(`Server returned ${resp.status}`);
    const data = await resp.json();
    orderHistory = data.orders || [];
  } catch (e) {
    orderHistory = [];
  }
  ordersLoading = false;
  renderOrders();
}

function renderOrders() {
  if (ordersLoading) {
    $app.innerHTML = `<div class="step" style="text-align:center;padding:3rem 0">
      <div style="font-size:1.25rem;font-weight:700;margin-bottom:0.5rem">Loading orders...</div>
      <div style="color:var(--muted)">Fetching your recent nemlig.com orders</div>
    </div>`;
    $bar.innerHTML = '';
    return;
  }

  if (!orderHistory.length) {
    $app.innerHTML = `<div class="step" style="text-align:center;padding:3rem 0">
      <div style="font-size:1.25rem;font-weight:700;margin-bottom:0.5rem">No orders yet</div>
      <div style="color:var(--muted)">Your recent nemlig.com orders will appear here.</div>
      ${!userProfile?.nemlig_email ? '<div style="margin-top:1rem"><button class="btn btn-primary" onclick="switchTab(\'profile\')">Connect nemlig.com</button></div>' : ''}
    </div>`;
    $bar.innerHTML = '';
    return;
  }

  const TYPEFORM_URL = localStorage.getItem('ugemad_typeform_url') || '';

  let html = '<div class="step"><div class="question">Recent Orders</div><div class="hint" style="margin-bottom:1.5rem">Your last orders from nemlig.com</div>';

  for (const order of orderHistory) {
    const statusMap = {0:'Pending', 1:'Confirmed', 2:'Packing', 3:'On the way', 4:'Delivered'};
    const status = statusMap[order.status] || 'Unknown';
    const statusColor = order.status === 4 ? 'var(--green)' : 'var(--muted)';

    html += `<div style="background:var(--bg);border-radius:12px;padding:1rem;margin-bottom:1rem">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:0.5rem">
        <div style="font-weight:700">${esc(order.date)}</div>
        <div style="display:flex;gap:0.75rem;align-items:center">
          <span style="font-size:0.8125rem;color:${statusColor};font-weight:600">${status}</span>
          <span style="font-weight:700">${(order.total || 0).toFixed(0)} kr</span>
        </div>
      </div>`;

    if (order.items && order.items.length) {
      html += `<div style="font-size:0.8125rem;color:var(--muted);line-height:1.8">`;
      const shown = order.items.slice(0, 6);
      html += shown.map(i => `${esc(i.name)} <span style="opacity:0.6">x${Math.round(i.quantity)}</span>`).join('<br>');
      if (order.items.length > 6) html += `<br><span style="font-style:italic">+${order.items.length - 6} more items</span>`;
      html += `</div>`;
    }

    if (TYPEFORM_URL) {
      const feedbackUrl = TYPEFORM_URL + (TYPEFORM_URL.includes('?') ? '&' : '?') + 'order_id=' + order.id + '&order_date=' + order.date;
      html += `<div style="margin-top:0.75rem"><a href="${feedbackUrl}" target="_blank" class="btn btn-secondary" style="font-size:0.75rem;padding:0.375rem 1rem;text-decoration:none;display:inline-block">Give feedback on this order</a></div>`;
    }

    html += `</div>`;
  }

  if (!TYPEFORM_URL) {
    html += `<div style="background:var(--green-bg);border-radius:12px;padding:1rem;margin-top:0.5rem">
      <div style="font-weight:600;font-size:0.875rem;margin-bottom:0.5rem">Set up meal feedback</div>
      <div style="font-size:0.8125rem;color:var(--muted);margin-bottom:0.75rem">Connect a Typeform to collect feedback on your meals. This helps improve future suggestions.</div>
      <div class="auth-input" style="margin-bottom:0.5rem">
        <input type="text" id="typeform-url-input" placeholder="https://your-name.typeform.com/to/abc123" style="font-size:0.8125rem">
      </div>
      <button class="btn btn-primary" style="font-size:0.75rem;padding:0.375rem 1rem" onclick="saveTypeformUrl()">Save Typeform URL</button>
    </div>`;
  } else {
    html += `<div style="text-align:center;margin-top:0.5rem">
      <button class="btn-text" style="font-size:0.75rem;color:var(--muted)" onclick="localStorage.removeItem('ugemad_typeform_url');renderOrders()">Change Typeform URL</button>
    </div>`;
  }

  html += '</div>';
  $app.innerHTML = html;
  $bar.innerHTML = '';
}

function saveTypeformUrl() {
  const url = document.getElementById('typeform-url-input')?.value?.trim();
  if (url) {
    localStorage.setItem('ugemad_typeform_url', url);
    renderOrders();
  }
}

  azure:     { endpoint: '', model: 'gpt-5.2', needsKey: true, hint: 'e.g. https://your-resource.openai.azure.com' },
  openai:    { endpoint: '', model: 'gpt-4o', needsKey: true, hint: 'Leave empty for api.openai.com' },
  anthropic: { endpoint: '', model: 'claude-sonnet-4-20250514', needsKey: true, hint: 'Leave empty for api.anthropic.com' },
  ollama:    { endpoint: 'http://localhost:11434', model: 'llama3', needsKey: false, hint: 'Your Ollama server address' },
  custom:    { endpoint: 'http://localhost:1234', model: 'default', needsKey: false, hint: 'Any OpenAI-compatible endpoint (LM Studio, vLLM, Groq, Together...)' },
};

function loadLLMSettings() {
  try { return JSON.parse(localStorage.getItem('llm_settings') || 'null'); } catch { return null; }
}

function saveLLMSettings() {
  const settings = {
    provider: document.getElementById('llm-provider').value,
    endpoint: document.getElementById('llm-endpoint').value.replace(/\/+$/, ''),
    model: document.getElementById('llm-model').value,
    apiKey: document.getElementById('llm-apikey').value,
  };
  localStorage.setItem('llm_settings', JSON.stringify(settings));
  updateProviderBadge();
}

function getLLMConfig() {
  return loadLLMSettings() || { provider: 'azure', endpoint: '', model: '', apiKey: '' };
}

function onProviderChange() {
  const p = document.getElementById('llm-provider').value;
  const def = PROVIDER_DEFAULTS[p];
  document.getElementById('llm-model').placeholder = def.model;
  document.getElementById('llm-endpoint').placeholder = def.endpoint || def.hint;
  document.getElementById('endpoint-hint').textContent = def.hint;
  document.getElementById('apikey-row').style.display = def.needsKey ? '' : 'none';

  if (!document.getElementById('llm-model').value) document.getElementById('llm-model').value = '';

function updateProviderBadge() {
  const cfg = getLLMConfig();

}

function toggleLLMPanel() {

(function initSettings() {
  const cfg = getLLMConfig();
  document.getElementById('llm-provider').value = cfg.provider || 'azure';
  document.getElementById('llm-endpoint').value = cfg.endpoint || '';

function apiHeaders() {
  return { 'Content-Type': 'application/json' };
}

function nemligPayload(extra) {
  const creds = userProfile?.nemlig_email && userProfile?.nemlig_pass
    ? { nemligUser: userProfile.nemlig_email, nemligPass: userProfile.nemlig_pass } : {};
  return JSON.stringify({ ...extra, ...creds });
}

const state = {
  step: 0,
  phase: 'auth',
  authView: 'login',
  meals: '', people: 2,
  days: ['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'],
  diets: [], dietCustom: '', budget: 500, notes: '',
  mealPlan: [], matched: [], notFound: [],
  totalPrice: 0, remaining: 0,
  addedCount: 0, failedCount: 0, errorMsg: '',
};

const STEPS = [
  { key: 'meals',  q: 'What sounds good this week?', hint: 'Describe meals, ingredients, cuisines, or just a vibe.', label: 'Inspiration' },
  { key: 'people', q: 'How many people?', hint: 'Portions scale automatically.', label: 'Household' },
  { key: 'days',   q: 'Which days?', hint: 'Tap the days you need meals for.', label: 'Schedule' },
  { key: 'diet',   q: 'Any dietary needs?', hint: 'Pick presets or type your own. Skip if none.', label: 'Dietary' },
  { key: 'budget', q: 'Weekly grocery budget', hint: 'In Danish kroner. We\'ll stay within this.', label: 'Budget' },
  { key: 'notes',  q: 'Anything else?', hint: 'Cooking time, organic preference, meal prep, etc.', label: 'Notes' },
  { key: 'review', q: 'Ready to plan?', hint: 'Here\'s what we\'ll send to the AI.', label: 'Review' },
];

// ── Render ─────────────────────────────────────────────────
const $app = document.getElementById('app');
const $bar = document.getElementById('bar');
let pipelineTimer = null;
let pipelineStep = 0;

function render() {
  if (state.phase === 'auth') return renderAuth();
  if (state.phase === 'profile-setup' || state.phase === 'profile') return renderProfileSetup();
  if (state.phase === 'orders') return renderOrders();
  if (state.phase === 'loading') return renderLoading();
  if (state.phase === 'results') return renderResults();
  if (state.phase === 'adding') return renderAdding();
  if (state.phase === 'done') return renderDone();
  if (state.phase === 'error') return renderError();
  renderStep();
}

function renderStep() {
  const s = STEPS[state.step];
  let html = `<div class="step">`;
  html += `<div class="step-header"><div class="step-number">${state.step + 1}</div><div class="step-label">${s.label || ''}</div></div>`;
  html += `<div class="question">${s.q}</div>`;
  html += `<div class="hint">${s.hint}</div>`;

  switch (s.key) {
    case 'meals':
      html += `<textarea id="input" placeholder="e.g. pasta carbonara, chicken stir fry, hearty soups...">${esc(state.meals)}</textarea>`;
      break;
    case 'people':
      html += `<div class="stepper">
        <button onclick="adj(-1)">&#8722;</button>
        <div class="value" id="ppl-val">${state.people}</div>
        <button onclick="adj(+1)">&#43;</button>
      </div>`;
      break;
    case 'days':
      html += `<div class="pills">`;
      for (const d of ALL_DAYS) {
        html += `<div class="pill ${state.days.includes(d)?'selected':''}" onclick="toggleDay('${d}')">${d.slice(0,3)}</div>`;
      }
      html += `</div>`;
      break;
    case 'diet':
      html += `<div class="chips">`;
      for (const d of DIETS) {
        html += `<div class="chip ${state.diets.includes(d)?'selected':''}" onclick="toggleDiet('${esc(d)}')">${d}</div>`;
      }
      html += `</div>`;
      html += `<input type="text" id="input" placeholder="Or type your own..." value="${esc(state.dietCustom)}" oninput="state.dietCustom=this.value">`;
      break;
    case 'budget':
      html += `<div class="budget-input">
        <input type="number" id="input" value="${state.budget}" min="100" step="50" oninput="state.budget=+this.value||500">
        <span>kr</span>
      </div>`;
      break;
    case 'notes':
      html += `<textarea id="input" placeholder="e.g. prefer organic, quick meals under 30 min, meal prep friendly...">${esc(state.notes)}</textarea>`;
      break;
    case 'review':
      const diet = [...state.diets, state.dietCustom].filter(Boolean).join(', ');
      html += `<div class="review-grid">
        <div class="review-item"><div class="review-label">People</div><div class="review-value">${state.people}</div></div>
        <div class="review-item"><div class="review-label">Days</div><div class="review-value">${state.days.length} days</div></div>
        <div class="review-item"><div class="review-label">Budget</div><div class="review-value">${state.budget} kr</div></div>
        <div class="review-item"><div class="review-label">Diet</div><div class="review-value">${diet || 'None'}</div></div>
        <div class="review-item review-full"><div class="review-label">Meals</div><div class="review-value">${esc(state.meals)}</div></div>
        ${state.notes ? `<div class="review-item review-full"><div class="review-label">Notes</div><div class="review-value">${esc(state.notes)}</div></div>` : ''}
      </div>`;
      break;
  }

  html += `<div class="actions">`;
  if (state.step > 0) html += `<button class="btn btn-secondary" onclick="prev()">Back</button>`;
  if (s.key === 'review') {
    html += `<button class="btn btn-primary" onclick="submit()">Plan My Meals</button>`;
  } else if (s.key === 'notes') {
    html += `<button class="btn btn-primary" onclick="next()">Review</button>`;
  } else {
    html += `<button class="btn btn-primary" onclick="next()">Next</button>`;
  }
  html += `</div>`;
  if (s.key === 'notes') html += `<div style="text-align:center;margin-top:0.5rem"><button class="btn-text" onclick="state.step++;render()">Skip</button></div>`;

  html += `</div>`;
  $app.innerHTML = html;
  renderBar();
  const inp = document.getElementById('input');
  if (inp) inp.focus();
}

function renderBar() {
  if (state.phase !== 'form') { $bar.innerHTML = ''; return; }
  let html = '';
  for (let i = 0; i < STEPS.length; i++) {
    html += `<div class="prog-seg ${i < state.step ? 'done' : i === state.step ? 'active' : ''}"></div>`;
  }
  $bar.innerHTML = html;
}

// ── Loading ────────────────────────────────────────────────
function getPipeline() {
  const diet = [...state.diets, state.dietCustom].filter(Boolean).join(', ');
  return [
    { id: 'prompt', icon: '1', title: 'Sending your request',
      detail: `${state.people} people \u00b7 ${state.days.length} days \u00b7 ${state.budget} kr${diet ? ' \u00b7 ' + diet : ''}` },
    { id: 'ai', icon: '2', title: 'AI is designing your menu',
      detail: `Analyzing "${state.meals.substring(0, 50)}${state.meals.length > 50 ? '\u2026' : ''}"` },
    { id: 'login', icon: '3', title: 'Connecting to nemlig.com',
      detail: 'Authenticating & fetching session...' },
    { id: 'search', icon: '4', title: 'Searching for products',
      detail: 'Looking up real products and prices...' },
    { id: 'result', icon: '5', title: 'Finalizing shopping list',
      detail: 'Checking stock & enforcing budget...' },
  ];
}

function renderLoading() {
  $bar.innerHTML = '';
  pipelineStep = 0;
  const P = getPipeline();

  let html = '<div class="pipeline">';
  for (let i = 0; i < P.length; i++) {
    html += `<div class="pipe-step${i===0?' active':''}" id="pipe-${P[i].id}">
      <div class="pipe-icon" id="pipe-icon-${P[i].id}">${P[i].icon}</div>
      <div class="pipe-body">
        <div class="pipe-title" id="pipe-title-${P[i].id}">${P[i].title}</div>
        <div class="pipe-detail" id="pipe-detail-${P[i].id}">${P[i].detail}</div>
      </div>
      <div class="pipe-connector"></div>
    </div>`;
  }
  html += '</div>';
  $app.innerHTML = html;

  const timings = [1500, 12000, 5000, 18000];
  const searchStart = timings[0]+timings[1]+timings[2];
  const ingredients = ['kyllingebrystfilet','basmatiris','broccoli','gulerødder','torskefilet','kartofler','olivenolie','havregryn','blåbær','squash','persille','salt','peber','smør','quinoa','æg'];
  let elapsed = 0;

  clearInterval(pipelineTimer);
  pipelineTimer = setInterval(() => {
    if (state.phase !== 'loading') { clearInterval(pipelineTimer); return; }
    elapsed += 500;

    if (pipelineStep === 1) {
      const el = document.getElementById('pipe-detail-ai');
      if (el) {
        const t = (elapsed - timings[0]) / 1000;
        if (t < 3) el.textContent = 'Planning meals for each day...';
        else if (t < 6) el.textContent = 'Selecting ingredients in Danish...';
        else if (t < 9) el.textContent = 'Writing recipes...';
        else el.textContent = 'Calculating quantities for ' + state.people + ' people...';
      }
    }

    if (pipelineStep === 3) {
      const t = Math.floor((elapsed - searchStart) / 1000);
      const idx = Math.min(t, ingredients.length - 1);
      const el = document.getElementById('pipe-detail-search');
      const ttl = document.getElementById('pipe-title-search');
      if (el && idx >= 0) el.textContent = `"${ingredients[idx]}" \u2192 checking price & stock...`;
      if (ttl) ttl.textContent = `Searching for products (${Math.min(t+1, ingredients.length)}/${ingredients.length})`;
    }
  }, 500);

  let delay = 0;
  for (let i = 0; i < timings.length; i++) {
    delay += timings[i];
    setTimeout(() => advancePipeline(i + 1), delay);
  }
}

function advancePipeline(to) {
  if (state.phase !== 'loading') return;
  const P = getPipeline();
  const doneTexts = { prompt: 'Sent', ai: 'Menu & recipes ready', login: 'Connected', search: 'Products matched', result: 'Done' };
  for (let i = 0; i < P.length; i++) {
    const el = document.getElementById(`pipe-${P[i].id}`);
    if (!el) return;
    el.classList.remove('active','done');
    if (i < to) {
      el.classList.add('done');
      const icon = document.getElementById(`pipe-icon-${P[i].id}`);
      if (icon) icon.textContent = '\u2713';
      const det = document.getElementById(`pipe-detail-${P[i].id}`);
      if (det) det.textContent = doneTexts[P[i].id] || '';
    } else if (i === to) {
      el.classList.add('active');
    }
  }
  pipelineStep = to;
}

  html += `</div>`;

  // Shopping list card (right column on desktop)
  html += `<div class="shop-card">`;
  html += `<div class="section-title" style="margin-top:0">Shopping List</div>`;
  for (let si = 0; si < state.matched.length; si++) {
    const item = state.matched[si];
    const removed = item._removed ? ' removed' : '';
    html += `<div class="receipt-line${removed}" id="shop-${si}">
      <span class="name">${esc(item.productName)}</span>
      <span class="qty">&times;${item.wantedQty}</span>
      <span class="price">${item._removed ? '—' : item.totalPrice.toFixed(2) + ' kr'}</span>
      <button class="remove-btn no-print" onclick="toggleShopItem(${si})" title="${item._removed ? 'Restore' : 'Remove'}">${item._removed ? '+' : '&times;'}</button>
    </div>`;
  }
  html += `<div class="receipt-divider"></div>`;
  html += `<div class="receipt-line receipt-total"><span class="name">Total</span><span class="price">${state.totalPrice.toFixed(2)} kr</span></div>`;
  html += `<div class="receipt-line"><span class="name">Budget</span><span class="price">${state.budget.toFixed(2)} kr</span></div>`;
  const rc = state.remaining >= 0 ? 'remaining-positive' : 'remaining-negative';
  html += `<div class="receipt-line"><span class="name">Remaining</span><span class="price ${rc}">${state.remaining.toFixed(2)} kr</span></div>`;

  if (state.notFound.length > 0) {
    html += `<div class="warning">Not found on nemlig.com:`;
    for (const nf of state.notFound) html += `<div class="warning-item">${esc(nf.displayName)}</div>`;
    html += `</div>`;
  }
  html += `</div>`; // close shop-card
  html += `</div>`; // close results-layout

  // Refine section
  html += `<div class="refine-section no-print">`;
  html += `<div class="section-title" style="margin-top:0">Adjust this plan</div>`;
  html += `<div class="refine-chips" id="refine-chips">`;
  const chips = ['Make it cheaper','More protein','Simpler recipes','Fewer ingredients','More variety','Swap expensive items'];
  for (const c of chips) {
    html += `<div class="refine-chip" onclick="toggleRefineChip(this,'${esc(c)}')">${c}</div>`;
  }
  html += `</div>`;
  html += `<textarea class="refine-input" id="refine-input" placeholder="Or describe what to change... e.g. 'replace turkey with chicken' or 'add a vegetarian day'" rows="2"></textarea>`;
  html += `<div class="actions" style="margin-top:0.75rem">
    <button class="btn btn-secondary" onclick="editPrefs()" style="flex:0.6">Edit preferences</button>
    <button class="btn btn-primary" onclick="refinePlan()">Regenerate</button>
  </div>`;
  html += `</div>`;

  html += `<div class="actions" style="margin-top:1.25rem">
    <button class="btn btn-secondary no-print" onclick="printPDF()" style="flex:0.4">PDF</button>
    <button class="btn btn-danger no-print" onclick="clearBasket()" style="flex:0.5">Clear Basket</button>
    <button class="btn btn-primary" onclick="approve()">Add to Basket</button>
  </div>`;
  html += `</div>`;
  $app.innerHTML = html;
}

function renderAdding() {
  clearInterval(pipelineTimer); $bar.innerHTML = '';
  $app.innerHTML = `<div class="pipeline"><div class="pipe-step active">
    <div class="pipe-icon" style="animation:pulse-ring 1.5s ease infinite;border-color:var(--green);color:var(--green)">...</div>
    <div class="pipe-body"><div class="pipe-title">Adding ${state.matched.length} items to your basket</div>
    <div class="pipe-detail" style="max-height:3rem;opacity:1">This may take a moment...</div></div>
  </div></div>`;
}

function renderDone() {
  clearInterval(pipelineTimer); $bar.innerHTML = '';
  let html = `<div class="done-view">`;
  html += state.failedCount === 0
    ? `<div class="icon">&#10003;</div><h2>${state.addedCount} items added to basket</h2>`
    : `<div class="icon">&#9888;</div><h2>${state.addedCount} added, ${state.failedCount} failed</h2>`;
  html += `<p>Review your basket and check out:</p>`;
  html += `<p style="margin-top:0.75rem"><a href="https://www.nemlig.com/checkout" target="_blank">Open nemlig.com checkout &rarr;</a></p>`;
  const tfUrl = localStorage.getItem('ugemad_typeform_url');
  if (tfUrl) {
    html += `<p style="margin-top:1.25rem"><a href="${tfUrl}" target="_blank" class="btn btn-secondary" style="text-decoration:none;display:inline-block;font-size:0.875rem">How was this meal plan?</a></p>`;
  }
  html += `<div class="actions" style="margin-top:2rem;justify-content:center"><button class="btn btn-secondary" onclick="reset()">Plan another week</button></div>`;
  html += `</div>`;
  $app.innerHTML = html;
}

function renderError() {
  clearInterval(pipelineTimer); $bar.innerHTML = '';
  $app.innerHTML = `<div class="done-view">
    <div class="icon">&#10007;</div><h2>Something went wrong</h2>
    <div class="error-msg">${esc(state.errorMsg)}</div>
    <div class="actions" style="margin-top:1.5rem;justify-content:center"><button class="btn btn-primary" onclick="reset()">Try Again</button></div>
  </div>`;
}

// ── Actions ────────────────────────────────────────────────
function adj(n) {
  state.people = Math.max(1, Math.min(12, state.people + n));
  const el = document.getElementById('ppl-val');
  if (el) el.textContent = state.people;
}
function toggleDay(d) { const i = state.days.indexOf(d); if (i>=0) state.days.splice(i,1); else state.days.push(d); render(); }
function toggleDiet(d) { const i = state.diets.indexOf(d); if (i>=0) state.diets.splice(i,1); else state.diets.push(d); render(); }

function saveStep() {
  const inp = document.getElementById('input');
  if (!inp) return;
  const s = STEPS[state.step];
  if (s.key === 'meals') state.meals = inp.value;
  if (s.key === 'notes') state.notes = inp.value;
  if (s.key === 'budget') state.budget = +inp.value || 500;
  if (s.key === 'diet') state.dietCustom = inp.value;
}

function next() {
  saveStep();
  if (STEPS[state.step].key === 'meals' && !state.meals.trim()) return;
  if (STEPS[state.step].key === 'days' && state.days.length === 0) return;
  state.step = Math.min(STEPS.length - 1, state.step + 1);
  render();
}
function prev() { saveStep(); state.step = Math.max(0, state.step - 1); render(); }

function reset() {
  Object.assign(state, { step:0, phase:'form', meals:'', people:2,
    days:['Monday','Tuesday','Wednesday','Thursday','Friday'],
    diets:[], dietCustom:'', budget:500, notes:'',
    mealPlan:[], matched:[], notFound:[], errorMsg:'' });
  // Re-apply saved preferences from profile
  if (userProfile) {
    state.people = userProfile.householdSize || 2;
    state.diets = userProfile.dietaryPreferences || [];
    state.budget = userProfile.weeklyBudget || 500;
    state.meals = userProfile.favoriteMeals || '';
    state.days = (userProfile.defaultDays && userProfile.defaultDays.length > 0) ? userProfile.defaultDays : [...ALL_DAYS];
    state.notes = userProfile.defaultNotes || '';
  }
  render();
}

// ── Refine & edit ──────────────────────────────────────────
let activeRefineChips = [];

function toggleRefineChip(el, text) {
  const idx = activeRefineChips.indexOf(text);
  if (idx >= 0) { activeRefineChips.splice(idx, 1); el.classList.remove('active'); }
  else { activeRefineChips.push(text); el.classList.add('active'); }
}

function toggleShopItem(idx) {
  state.matched[idx]._removed = !state.matched[idx]._removed;
  // Recalculate totals
  state.totalPrice = state.matched.filter(m => !m._removed).reduce((s, m) => s + m.totalPrice, 0);
  state.remaining = state.budget - state.totalPrice;
  render();
}

function editPrefs() {
  // Go back to review step with all data preserved
  state.phase = 'form';
  state.step = STEPS.length - 1; // review step
  render();
}

function refinePlan() {
  const input = document.getElementById('refine-input');
  const feedback = input ? input.value.trim() : '';
  const chipText = activeRefineChips.join('. ');
  const allFeedback = [chipText, feedback].filter(Boolean).join('. ');

  if (!allFeedback) return;

  // Append feedback to notes and re-submit
  const prevNotes = state.notes;
  state.notes = [prevNotes, 'ADJUSTMENT REQUEST: ' + allFeedback].filter(Boolean).join('. ');
  activeRefineChips = [];

  // Remove items the user crossed out from the meal context
  const removedItems = state.matched.filter(m => m._removed).map(m => m.productName);
  if (removedItems.length) {
    state.notes += '. User removed these items: ' + removedItems.join(', ') + ' — find alternatives or drop them.';
  }

  state.phase = 'loading';
  render();
  submitWithNotes(state.notes).then(() => {
    state.notes = prevNotes; // restore original notes
  });
}

// ── API calls ──────────────────────────────────────────────
async function submit() {
  saveStep();
  if (!state.meals.trim()) { state.step = 0; render(); return; }
  state.phase = 'loading';
  render();
  await submitWithNotes(state.notes);
}

async function submitWithNotes(notes) {
  const diet = [...state.diets, state.dietCustom].filter(Boolean).join(', ');
  const base = getN8nBase();
  const tp = API_TOKEN ? `?token=${API_TOKEN}` : '';
  const nemligCreds = userProfile?.nemlig_email && userProfile?.nemlig_pass
    ? { nemligUser: userProfile.nemlig_email, nemligPass: userProfile.nemlig_pass } : {};
  const payload = JSON.stringify({ meals: state.meals, people: state.people, days: state.days.join(', '), diet, budget: state.budget, notes, llmConfig: getLLMConfig(), ...nemligCreds });

  // Safari iOS kills long fetch requests — retry up to 3 times
  let lastErr;
  for (let attempt = 0; attempt < 3; attempt++) {
    try {
      if (attempt > 0) {
        const el = document.getElementById('pipe-detail-prompt');
        if (el) el.textContent = `Retrying... (attempt ${attempt + 1}/3)`;
      }
      const ctrl = new AbortController();
      const timeout = setTimeout(() => ctrl.abort(), 300000);
      const resp = await fetch(`${base}/webhook/meal-plan${tp}`, {
        method: 'POST', headers: apiHeaders(), body: payload, signal: ctrl.signal,
      });
      clearTimeout(timeout);
      if (!resp.ok) throw new Error(`Server returned ${resp.status}`);
      const data = await resp.json();
      state.mealPlan = data.mealPlan || [];
      state.matched = (data.matched || []).map(m => ({ ...m, _removed: false }));
      state.notFound = data.notFound || [];
      state.totalPrice = data.totalPrice || 0;
      state.remaining = (state.budget || 500) - state.totalPrice;
      state.phase = 'results';
      render();
      return;
    } catch (e) {
      lastErr = e;
      if (e.name === 'AbortError') break; // manual abort, don't retry
      // Wait 1s before retry
      await new Promise(r => setTimeout(r, 1000));
    }
  }
  state.errorMsg = lastErr?.message || 'Network error';
  state.phase = 'error';
  render();
}

async function approve() {
  state.phase = 'adding'; render();
  const items = state.matched.map(m => ({ productId: m.productId, quantity: m.wantedQty, name: m.productName }));
  try {
    const base = getN8nBase();
    const tp = API_TOKEN ? `?token=${API_TOKEN}` : '';
    const resp = await fetch(`${base}/webhook/meal-plan-approve${tp}`, {
      method: 'POST', headers: apiHeaders(),
      body: nemligPayload({ items }),
    });
    if (!resp.ok) throw new Error(`Server returned ${resp.status}`);
    const data = await resp.json();
    state.addedCount = data.added || 0;
    state.failedCount = data.failed || 0;
    state.phase = 'done';
    fetchBasket();
  } catch (e) {
    state.errorMsg = e.message || 'Failed to add items.';
    state.phase = 'error';
  }
  render();
}

async function clearBasket() {
  if (!confirm('Clear your entire nemlig.com basket?')) return;
  state.phase = 'adding'; render();
  $app.innerHTML = `<div class="pipeline"><div class="pipe-step active">
    <div class="pipe-icon" style="animation:pulse-ring 1.5s ease infinite;border-color:var(--red);color:var(--red)">...</div>
    <div class="pipe-body"><div class="pipe-title">Clearing your basket</div>
    <div class="pipe-detail" style="max-height:3rem;opacity:1">Removing all items from nemlig.com...</div></div>
  </div></div>`;
  try {
    const base = getN8nBase();
    const tp = API_TOKEN ? `?token=${API_TOKEN}` : '';
    const resp = await fetch(`${base}/webhook/meal-plan-approve${tp}`, {
      method: 'POST', headers: apiHeaders(),
      body: nemligPayload({ action: 'clear' }),
    });
    if (!resp.ok) throw new Error(`Server returned ${resp.status}`);
    const data = await resp.json();
    state.phase = 'results';
    render();
    alert('Basket cleared!');
  } catch (e) {
    state.errorMsg = e.message || 'Failed to clear basket.';
    state.phase = 'error';
    render();
  }
}

// ── Basket viewer ──────────────────────────────────────────
let basketData = { items: [], count: 0, total: 0 };

async function fetchBasket() {
  try {
    const base = getN8nBase();
    const tp = API_TOKEN ? `?token=${API_TOKEN}` : '';
    const resp = await fetch(`${base}/webhook/meal-plan-approve${tp}`, {
      method: 'POST', headers: apiHeaders(),
      body: nemligPayload({ action: 'view' }),
    });
    if (!resp.ok) return;
    basketData = await resp.json();
    updateBasketUI();
  } catch (e) { /* silent */ }
}

function updateBasketUI() {
  const countEl = document.getElementById('basket-count');
  const totalEl = document.getElementById('basket-total');
  const itemsEl = document.getElementById('basket-items');
  if (!countEl) return;

  countEl.textContent = basketData.count || 0;
  countEl.className = 'basket-count' + (basketData.count ? '' : ' empty');
  totalEl.textContent = (basketData.total || 0).toFixed(2) + ' kr';

  const delBarEl = document.getElementById('basket-delivery');
  const del2 = basketData.delivery;
  if (delBarEl && del2 && del2.time) {
    delBarEl.innerHTML = del2.time + (del2.free ? ' &middot; <span style="color:var(--green)">gratis levering</span>' : '');
  }

  let html = '';

  // Delivery info
  const del = basketData.delivery;
  if (del && del.time) {
    const freeTag = del.free ? ' <span style="color:var(--green);font-weight:600">GRATIS</span>' : ` ${(del.price||0).toFixed(2)} kr`;
    html += `<div style="padding:0.5rem 0;font-size:0.75rem;border-bottom:1px solid var(--bg);display:flex;justify-content:space-between;align-items:center">
      <span>Delivery: ${esc(del.time)}</span><span>${freeTag}</span>
    </div>`;
  }

  if (basketData.items && basketData.items.length) {
    for (const item of basketData.items) {
      html += `<div class="basket-item">
        <span class="name">${esc(item.name)}</span>
        <span class="qty">&times;${item.qty}</span>
        <span class="price">${(item.price || 0).toFixed(2)} kr</span>
      </div>`;
    }
    html += `<div class="basket-actions">
      <button class="btn btn-danger" style="flex:1;padding:0.375rem;font-size:0.75rem" onclick="event.stopPropagation();clearBasketQuick()">Clear All</button>
      <a href="https://www.nemlig.com/checkout" target="_blank" class="btn btn-primary" style="flex:1;padding:0.375rem;font-size:0.75rem;text-align:center;text-decoration:none;color:white">Checkout</a>
    </div>`;
  } else {
    html += '<div style="text-align:center;color:var(--muted);padding:0.5rem;font-size:0.75rem">Basket is empty</div>';
  }
  itemsEl.innerHTML = html;
}

function toggleBasket() {
  const panel = document.getElementById('basket-panel');
  if (panel.classList.contains('open')) {
    panel.classList.remove('open');
  } else {
    panel.classList.add('open');
    fetchBasket();
  }
}

async function clearBasketQuick() {
  if (!confirm('Clear your entire nemlig.com basket?')) return;
  try {
    const base = getN8nBase();
    const tp = API_TOKEN ? `?token=${API_TOKEN}` : '';
    await fetch(`${base}/webhook/meal-plan-approve${tp}`, {
      method: 'POST', headers: apiHeaders(),
      body: nemligPayload({ action: 'clear' }),
    });
    basketData = { items: [], count: 0, total: 0 };
    updateBasketUI();
  } catch (e) { /* silent */ }
}

// ── Keyboard ───────────────────────────────────────────────
document.addEventListener('keydown', (e) => {
  if (state.phase !== 'form') return;
  if (e.key === 'Enter' && !e.shiftKey) {
    const tag = document.activeElement?.tagName;
    if (tag === 'TEXTAREA') return;
    e.preventDefault();
    if (STEPS[state.step].key === 'review') submit();
    else next();
  }
});

function esc(s) { const d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }
function getWeekNumber() {
  const d = new Date(); d.setHours(0,0,0,0);
  d.setDate(d.getDate() + 3 - (d.getDay() + 6) % 7);
  const w1 = new Date(d.getFullYear(), 0, 4);
  return 1 + Math.round(((d - w1) / 86400000 - 3 + (w1.getDay() + 6) % 7) / 7);
}

// ── Auth Bootstrap ─────────────────────────────────────────
// Render the auth UI synchronously first — never block on network.
// Then asynchronously restore session / listen for auth changes.
render();

(async function authBootstrap() {
  if (devModeActive) return;
  if (!sb) return;

  // Listen for auth state changes (handles OAuth redirects + session restore)
  try {
    sb.auth.onAuthStateChange(async (event, session) => {
      if (devModeActive) return;
      if (session?.user) {
        currentUser = session.user;
        try { await loadProfile(currentUser.id); } catch (e) { console.warn('profile load failed:', e); }
        renderUserBar();
        if (state.phase === 'auth') {
          state.phase = userProfile?.display_name ? 'form' : 'profile-setup';
          if (state.phase === 'form') fetchBasket();
          render();
        }
      } else if (event === 'SIGNED_OUT') {
        currentUser = null;
        userProfile = null;
        state.phase = 'auth';
        state.authView = 'login';
        renderUserBar();
        render();
      }
    });
  } catch (e) { console.warn('onAuthStateChange failed:', e); }

  // Check for existing session (with timeout so blocked CDN/network can't hang us)
  try {
    const userPromise = sb.auth.getUser();
    const timeout = new Promise((_, rej) => setTimeout(() => rej(new Error('getUser timeout')), 5000));
    const { data: { user } = {} } = await Promise.race([userPromise, timeout]);
    if (user) {
      currentUser = user;
      try { await loadProfile(user.id); } catch (e) { console.warn('profile load failed:', e); }
      renderUserBar();
      state.phase = userProfile?.display_name ? 'form' : 'profile-setup';
      if (state.phase === 'form') fetchBasket();
      render();
    }
  } catch (e) {
    console.warn('session check failed:', e);
    // Auth UI already rendered above, user can still sign in.
  }
})();
